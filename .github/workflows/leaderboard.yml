name: 📊 Contributor Leaderboard

on:
  pull_request_target:
    types:
      - closed

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: leaderboard-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  leaderboard:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate leaderboard comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_AUTHOR_TYPE: ${{ github.event.pull_request.user.type }}
          PR_AUTHOR_ASSOCIATION: ${{ github.event.pull_request.author_association }}
          PR_ACTION: ${{ github.event.action }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          node .github/scripts/generate-leaderboard-comment.js > comment.md

      - name: Post PR comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('comment.md', 'utf8');

            if (!body.trim()) return;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const marker = `leaderboard-${context.payload.action}`;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const alreadyExists = comments.some(c =>
              c.user && c.user.type === 'Bot' && (c.body || '').includes(marker)
            );

            if (alreadyExists) return;

            await github.rest.issues.createComment({
              owner, repo, issue_number, body
            });
