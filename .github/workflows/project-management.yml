name: 📋 Project Management

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

  issues:
    types:
      - opened
      - edited
      - reopened

  schedule:
    - cron: '0 */12 * * *'

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: project-mgmt-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:

  # =========================================================
  # AUTO LABEL PRs BY FILE PATHS
  # =========================================================

  auto-label-by-path:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest

    steps:
      - name: Auto-label PR by changed paths
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            if (!prNumber) return;

            const { data: files } =
              await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100
              });

            const labelsToAdd = new Set();

            const pathRules = [
              {
                prefixes: ['docs/', 'documentation/'],
                label: 'type:docs'
              },
              {
                prefixes: ['.github/workflows/', '.github/actions/'],
                label: 'type:devops'
              },
              {
                prefixes: ['api/', 'server/', 'backend/'],
                label: 'backend'
              },
              {
                prefixes: ['src/components/', 'frontend/', 'ui/'],
                label: 'frontend'
              },
              {
                prefixes: ['security/', 'auth/'],
                label: 'type:security'
              },
              {
                prefixes: ['tests/', '__tests__/'],
                label: 'type:testing'
              }
            ];

            for (const file of files) {

              const filename = file.filename || '';

              if (
                filename.includes('..') ||
                filename.startsWith('/') ||
                filename.length > 300
              ) continue;

              for (const rule of pathRules) {
                if (
                  rule.prefixes.some(prefix =>
                    filename.startsWith(prefix)
                  )
                ) {
                  labelsToAdd.add(rule.label);
                }
              }
            }

            // Large PR detection
            const additions =
              context.payload.pull_request.additions || 0;

            const changedFiles =
              context.payload.pull_request.changed_files || 0;

            if (
              additions > 800 ||
              changedFiles > 30
            ) {
              labelsToAdd.add('large-pr');
            }

            if (labelsToAdd.size === 0) {
              core.info('No labels to add');
              return;
            }

            const existingLabels =
              (context.payload.pull_request.labels || [])
                .map(l => l.name.toLowerCase());

            const finalLabels =
              Array.from(labelsToAdd)
                .filter(l => !existingLabels.includes(l.toLowerCase()));

            if (finalLabels.length === 0) {
              core.info('All labels already exist');
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels: finalLabels
            });

            core.info(
              `Added labels: ${finalLabels.join(', ')}`
            );

  # =========================================================
  # ISSUE AUTO TRIAGE
  # =========================================================

  issue-project-triage:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Auto-triage issues
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue = context.payload.issue;

            if (!issue) return;
            if (issue.pull_request) return;
            if (issue.user.type === 'Bot') return;

            const issue_number = issue.number;

            const combined =
              `${issue.title || ''}\n${issue.body || ''}`
                .toLowerCase();

            const labelRules = {
              'type:bug': [
                'bug',
                'error',
                'crash',
                'broken',
                'not working',
                'fails'
              ],

              'type:docs': [
                'readme',
                'documentation',
                'typo',
                'spelling'
              ],

              'type:security': [
                'xss',
                'csrf',
                'vulnerability',
                'security',
                'auth bypass'
              ],

              'type:testing': [
                'test',
                'coverage',
                'failing test'
              ],

              'type:devops': [
                'workflow',
                'github action',
                'ci/cd',
                'pipeline',
                'deploy'
              ],

              'frontend': [
                'ui',
                'button',
                'layout',
                'responsive',
                'frontend',
                'css'
              ],

              'backend': [
                'api',
                'database',
                'backend',
                'endpoint',
                'server'
              ]
            };

            const labelsToAdd = new Set();

            for (const [label, keywords] of Object.entries(labelRules)) {

              if (
                keywords.some(k => combined.includes(k))
              ) {
                labelsToAdd.add(label);
              }
            }

            const existingLabels =
              (issue.labels || [])
                .map(l => l.name.toLowerCase());

            const finalLabels =
              Array.from(labelsToAdd)
                .filter(l => !existingLabels.includes(l));

            if (finalLabels.length === 0) {
              core.info('No new labels needed');
              return;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: finalLabels
            });

            core.info(
              `Added issue labels: ${finalLabels.join(', ')}`
            );

  # =========================================================
  # STALE REVIEW REMINDERS
  # =========================================================

  stale-pr-reminder:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Remind stale mentor reviews
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const MARKER =
              '<!-- stale-review-reminder -->';

            const { data: prs } =
              await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                per_page: 100
              });

            for (const pr of prs) {

              const labels =
                (pr.labels || [])
                  .map(l => l.name.toLowerCase());

              if (
                !labels.includes('mentor-review-requested')
              ) continue;

              if (
                labels.includes('gssoc-mentor-approved')
              ) continue;

              const createdAt =
                new Date(pr.created_at);

              const hoursOpen =
                (Date.now() - createdAt.getTime()) /
                (1000 * 60 * 60);

              if (hoursOpen < 48) continue;

              const comments =
                await github.paginate(
                  github.rest.issues.listComments,
                  {
                    owner,
                    repo,
                    issue_number: pr.number,
                    per_page: 100
                  }
                );

              const alreadyCommented =
                comments.some(c =>
                  c.body &&
                  c.body.includes(MARKER)
                );

              if (alreadyCommented) {
                core.info(
                  `Reminder already exists for PR #${pr.number}`
                );
                continue;
              }

              const { data: reviewers } =
                await github.rest.pulls
                  .listRequestedReviewers({
                    owner,
                    repo,
                    pull_number: pr.number
                  });

              const pending =
                (reviewers.users || [])
                  .map(u => `@${u.login}`);

              const pendingText =
                pending.length > 0
                  ? pending.join(', ')
                  : 'No reviewers assigned';

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body:
                  `${MARKER}\n` +
                  `⏰ **Mentor Review Reminder**\n\n` +
                  `This PR has been waiting for mentor review for over 48 hours.\n\n` +
                  `Pending reviewers: ${pendingText}\n\n` +
                  `Maintainers may reassign reviewers if needed.`
              });

              core.info(
                `Posted stale reminder for PR #${pr.number}`
              );
            }