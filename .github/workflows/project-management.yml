name: 📋 Project Management

on:
  pull_request_target:
    types:
      - opened
      - synchronize
  issues:
    types:
      - opened
      - edited
  schedule:
    - cron: '0 */12 * * *'

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: project-mgmt-${{ github.event.pull_request.number || github.event.issue.number || 'scheduled' }}
  cancel-in-progress: true

jobs:
  auto-label-by-path:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Auto-label PR by changed file paths
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            if (typeof prNumber !== 'number' || prNumber <= 0) return;

            const { data: files } = await github.rest.pulls.listFiles({
              owner, repo, pull_number: prNumber, per_page: 100
            });

            const pathLabels = {
              'src/': 'type:feature',
              'api/': 'type:feature',
              'data/': 'type:feature',
              '.github/workflows/': 'type:devops',
              '.github/': 'type:devops',
              'agent/': 'type:devops',
              'docs/': 'type:docs'
            };

            const safeFilenamePattern = /^[\w\-./]+$/;
            const labelsToAdd = new Set();

            for (const file of files) {
              if (!safeFilenamePattern.test(file.filename)) continue;
              for (const [prefix, label] of Object.entries(pathLabels)) {
                if (file.filename.startsWith(prefix)) {
                  labelsToAdd.add(label);
                }
              }
            }

            if (files.length > 20) {
              labelsToAdd.add('large-pr');
            }

            if (labelsToAdd.size > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNumber,
                  labels: Array.from(labelsToAdd)
                });
              } catch (e) {
                core.warning(`Failed to add path labels: ${e?.message || e}`);
              }
            }

  issue-project-triage:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-triage issues by content
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue;
            const issue_number = issue.number;

            if (issue.user.type === 'Bot') return;
            if (issue.pull_request) return;

            const title = (issue.title || '').toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const combined = title + ' ' + body;

            const typeLabels = {
              'type:bug': ['bug', 'broken', 'not working', 'error message', 'crash', 'regression'],
              'type:feature': ['feature request', 'enhancement', 'implement', 'add support', 'ui component', 'css', 'stylesheet', 'button', 'layout', 'responsive design', 'frontend', 'api endpoint', 'rest api', 'fetch data', 'cors', 'proxy', 'graphql', 'org data', 'json data', 'organizations list', 'scrape', 'dataset'],
              'type:docs': ['readme', 'documentation', 'typo in docs', 'grammar fix', 'spelling', 'typo', 'readme update'],
              'type:devops': ['workflow', 'ci/cd', 'github action', 'deploy', 'pipeline', 'docker'],
              'type:performance': ['slow loading', 'performance issue', 'optimize', 'cache', 'page speed'],
              'type:testing': ['test', 'unit test', 'integration test', 'coverage', 'test case', 'failing test'],
              'type:accessibility': ['accessibility', 'a11y', 'screen reader', 'aria', 'keyboard navigation', 'contrast'],
              'type:security': ['security', 'vulnerability', 'xss', 'injection', 'auth', 'authentication', 'authorization'],
              'type:design': ['design', 'ui/ux', 'mockup', 'figma', 'color scheme', 'theme', 'dark mode'],
              'type:refactor': ['refactor', 'cleanup', 'technical debt', 'code smell', 'restructure']
            };

            const labelsToAdd = new Set();

            for (const [label, keywords] of Object.entries(typeLabels)) {
              if (keywords.some(k => combined.includes(k))) {
                labelsToAdd.add(label);
              }
            }

            const existingLabels = (issue.labels || []).map(l => l.name.toLowerCase());
            const newLabels = Array.from(labelsToAdd).filter(l => !existingLabels.includes(l));

            if (newLabels.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number, labels: newLabels
                });
              } catch (e) {
                core.warning(`Failed to add triage labels: ${e?.message || e}`);
              }
            }

  stale-pr-reminder:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      issues: write
    steps:
      - name: Check for stale mentor reviews
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 100
            });

            for (const pr of prs) {
              const prNumber = pr.number;
              const prLabels = (pr.labels || []).map(l => l.name.toLowerCase());

              if (!prLabels.includes('mentor-review-requested')) continue;
              if (prLabels.includes('gssoc-mentor-approved')) continue;

              const { data: events } = await github.rest.issues.listEvents({
                owner, repo, issue_number: prNumber, per_page: 100
              });

              const labelEvent = events
                .filter(e => e.event === 'labeled' && e.label && e.label.name === 'mentor-review-requested')
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

              if (!labelEvent) continue;

              const labeledAt = new Date(labelEvent.created_at);
              const hoursSinceLabeled = (new Date() - labeledAt) / (1000 * 60 * 60);

              if (hoursSinceLabeled <= 48) continue;

              const { data: requested } = await github.rest.pulls.listRequestedReviewers({
                owner, repo, pull_number: prNumber
              });

              const pendingReviewers = (requested.users || []).map(u => `@${u.login}`);

              if (pendingReviewers.length > 0) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body: `⏰ **Reminder:** This PR has been awaiting mentor review for over 48 hours.\n\n` +
                    `Pending reviewers: ${pendingReviewers.join(', ')}\n\n` +
                    `If reviewers are unavailable, a maintainer may reassign.`
                });
              }
            }
