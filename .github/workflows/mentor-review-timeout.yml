name: "\u23F0 Mentor Review Timeout"

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  check-stale-reviews:
    runs-on: ubuntu-latest
    steps:
      - name: Replace inactive mentor reviewers after 24 hours
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const TIMEOUT_HOURS = 24;
            const now = new Date();

            let mentorPool = [];
            const validUsername = /^[a-zA-Z0-9](?:[a-zA-Z0-9\-]*[a-zA-Z0-9])?$/;

            try {
              const { data: file } = await github.rest.repos.getContent({
                owner, repo, path: '.github/reviewers/gssoc-mentors.json', ref: 'main'
              });
              const content = Buffer.from(file.content, 'base64').toString('utf8');
              const parsed = JSON.parse(content);
              mentorPool = (parsed.reviewers || []).filter(r => validUsername.test(r));
            } catch (e) {
              core.warning(`Failed to load mentor pool: ${e?.message || e}`);
              return;
            }

            if (mentorPool.length === 0) {
              core.info('No mentors available.');
              return;
            }

            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 100
            });

            for (const pr of prs) {
              const prNumber = pr.number;
              const prLabels = (pr.labels || []).map(l => l.name.toLowerCase());

              if (!prLabels.includes('mentor-review-requested')) continue;
              if (prLabels.includes('gssoc-mentor-approved') || prLabels.includes('mentor-approved')) continue;

              const { data: requested } = await github.rest.pulls.listRequestedReviewers({
                owner, repo, pull_number: prNumber
              });
              const mentorSet = new Set(mentorPool.map(m => m.toLowerCase()));
              const currentReviewers = (requested.users || [])
                .map(u => u.login)
                .filter(login => mentorSet.has(login.toLowerCase()));

              if (currentReviewers.length === 0) continue;

              const { data: events } = await github.rest.issues.listEvents({
                owner, repo, issue_number: prNumber, per_page: 100
              });

              const reviewRequestEvents = events.filter(e =>
                e.event === 'review_requested' && e.requested_reviewer
              );

              const staleReviewers = [];
              for (const reviewer of currentReviewers) {
                const requestEvent = reviewRequestEvents
                  .filter(e => e.requested_reviewer.login.toLowerCase() === reviewer.toLowerCase())
                  .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

                if (!requestEvent) continue;

                const hoursSinceRequest = (now - new Date(requestEvent.created_at)) / (1000 * 60 * 60);
                if (hoursSinceRequest >= TIMEOUT_HOURS) {
                  staleReviewers.push(reviewer);
                }
              }

              if (staleReviewers.length === 0) continue;

              const prAuthor = pr.user.login.toLowerCase();
              const alreadyRequested = currentReviewers.map(r => r.toLowerCase());
              const exclude = new Set([...alreadyRequested, prAuthor, ...staleReviewers.map(r => r.toLowerCase())]);

              const available = mentorPool.filter(m => !exclude.has(m.toLowerCase()));

              const replacements = available.slice(0, staleReviewers.length);

              for (const stale of staleReviewers) {
                try {
                  await github.rest.pulls.removeRequestedReviewers({
                    owner, repo, pull_number: prNumber, reviewers: [stale]
                  });
                } catch (e) {
                  core.warning(`Failed to remove reviewer @${stale}: ${e?.message || e}`);
                }
              }

              const successfulReplacements = [];
              for (const replacement of replacements) {
                try {
                  await github.rest.pulls.requestReviewers({
                    owner, repo, pull_number: prNumber, reviewers: [replacement]
                  });
                  successfulReplacements.push(replacement);
                } catch (e) {
                  core.warning(`Failed to request @${replacement}: ${e?.message || e}`);
                }
              }

              if (staleReviewers.length > 0) {
                const body = [
                  `## ⏰ Mentor Review Timeout`,
                  ``,
                  `The following reviewer(s) did not respond within **${TIMEOUT_HOURS} hours**:`,
                  staleReviewers.map(r => `- ~@${r}~ (removed)`).join('\n'),
                  ``,
                  successfulReplacements.length > 0
                    ? `**Replacement reviewer(s) assigned:**\n${successfulReplacements.map(r => `- @${r}`).join('\n')}`
                    : `⚠️ No replacement mentors available. @S3DFX-CYBER please assign a reviewer manually.`,
                  ``,
                  `---`,
                  `*Mentors are expected to review within 24 hours. This is an automated rotation.*`
                ].join('\n');

                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber, body
                });

                core.info(`PR #${prNumber}: Replaced ${staleReviewers.join(', ')} with ${successfulReplacements.join(', ') || 'none available'}`);
              }
            }
