name: 🛡️ PR Quality Guard

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality-check:
    name: Detect Low Quality PRs
    runs-on: ubuntu-latest

    if: |
      github.event.pull_request.draft == false &&
      github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      # -------------------------------------------------------
      # Existing anti-slop
      # -------------------------------------------------------

      - name: Run Anti-Slop Detection
        uses: peakoss/anti-slop@v0.2.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          max-failures: 5

          require-description: true
          require-linked-issue: true
          require-pr-template: true
          require-maintainer-can-modify: true

          require-conventional-title: true
          require-conventional-commits: false

          max-description-length: 2200
          max-emoji-count: 5

          detect-spam-usernames: true
          min-account-age: 5

          blocked-terms: |
            generated by chatgpt
            generated with chatgpt
            fully generated by ai
            auto generated pull request
            this pr was automatically generated
            created entirely using ai
            no manual changes were made
            prompt used
            as an ai language model
            chatgpt said
            claude generated
            gemini wrote
            grok generated

          strict-pr-template-sections: |
            checklist
            description

          blocked-source-branches: |
            main
            master

          exempt-author-association: OWNER,MEMBER,COLLABORATOR

          exempt-bots: |
            github-actions[bot]
            dependabot[bot]

          failure-add-pr-labels: |
            suspected-ai-slop
            needs-human-review

          failure-pr-message: |
            ## ⚠️ PR Needs Maintainer Review

            This PR was flagged by automated quality checks.

            A maintainer will review it shortly.

          close-pr: false
          lock-pr: false

      # -------------------------------------------------------
      # Heuristic AI / Vibecode Detection
      # -------------------------------------------------------

      - name: Detect suspicious vibecoded patterns
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request.number;

            const { data: files } = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: pr,
              per_page: 100
            });

            let suspiciousScore = 0;
            const reasons = [];

            for (const file of files) {

              const additions = file.additions || 0;
              const filename = file.filename || '';
              const patch = file.patch || '';

              // Giant additions in one file
              if (additions > 120) {
                suspiciousScore += 2;
                reasons.push(
                  `Large insertion in \`${filename}\` (+${additions})`
                );
              }

              // Huge comment density
              const commentLines =
                (patch.match(/\/\/|\/\*|\*/g) || []).length;

              if (commentLines > 15) {
                suspiciousScore += 2;
                reasons.push(
                  `Excessive comments in \`${filename}\``
                );
              }

              // AI-style wording
              const aiPatterns = [
                'lightweight scoring helper',
                'canonical scoring helper',
                'mirrored locally here',
                'exposed on globalthis',
                'similar organizations',
                'runtime dependencies',
                'helper lives in',
                'until both surfaces can share'
              ];

              for (const pattern of aiPatterns) {
                if (patch.toLowerCase().includes(pattern)) {
                  suspiciousScore += 2;
                  reasons.push(
                    `AI-style generated explanation detected`
                  );
                  break;
                }
              }

              // Massive helper injection
              const functionMatches =
                patch.match(/function\s+[a-zA-Z0-9_]+/g) || [];

              if (functionMatches.length >= 4) {
                suspiciousScore += 1;
                reasons.push(
                  `Multiple helper functions added in \`${filename}\``
                );
              }

              // Excessive markdown/comment separators
              const separatorCount =
                (patch.match(/====|----/g) || []).length;

              if (separatorCount > 3) {
                suspiciousScore += 1;
                reasons.push(
                  `Generated-style separators detected`
                );
              }
            }

            core.info(`Suspicious score: ${suspiciousScore}`);

            if (suspiciousScore < 4) {
              core.info('PR passed heuristic checks');
              return;
            }

            // Add labels
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr,
                labels: [
                  'suspected-ai-slop',
                  'needs-human-review'
                ]
              });
            } catch (e) {}

            // Sticky comment
            const marker =
              '<!-- vibecode-detection -->';

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number: pr,
                  per_page: 100
                }
              );

            const existing = comments.find(c =>
              c.body.includes(marker)
            );

            const body =
              `${marker}\n` +
              `## ⚠️ Suspicious Generated Code Detected\n\n` +
              `This PR contains patterns commonly associated with low-quality AI-generated submissions.\n\n` +
              `### Detected Signals\n\n` +
              reasons.map(r => `- ${r}`).join('\n') +
              `\n\n` +
              `A maintainer or mentor should manually review this PR before merge.\n\n` +
              `This is not an automatic rejection.`;


            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr,
                body
              });
            }