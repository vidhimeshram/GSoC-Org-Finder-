name: 👥 Request Reviewers (Stage 2)

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - labeled
      - ready_for_review

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: request-reviewers-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-reviewers:
    runs-on: ubuntu-latest
    if: |
      !github.event.pull_request.draft &&
      contains(github.event.pull_request.labels.*.name, 'stage-1-approved')

    steps:
      - name: Stage 2 - Request Reviewers
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            const labels = (pr.labels || []).map(l => l.name.toLowerCase());
            const isGssoc = labels.includes('gssoc26');

            if (!isGssoc) {
              core.info('PR is not GSSOC. Skipping Stage 2 reviewer assignment.');
              return;
            }

            const { data: requested } = await github.rest.pulls.listRequestedReviewers({
              owner, repo, pull_number: prNumber
            });
            const alreadyRequested = (requested.users || []).map(u => u.login.toLowerCase());

            if (alreadyRequested.length >= 2) {
              core.info('Enough reviewers already requested. Skipping.');
              return;
            }

            let reviewerPool = [];
            const validUsername = /^[a-zA-Z0-9](?:[a-zA-Z0-9\-]*[a-zA-Z0-9])?$/;

            try {
              const { data: file } = await github.rest.repos.getContent({
                owner, repo, path: '.github/reviewers/gssoc-mentors.json', ref: 'main'
              });
              const content = Buffer.from(file.content, 'base64').toString('utf8');
              const parsed = JSON.parse(content);
              reviewerPool = (parsed.reviewers || []).filter(r => validUsername.test(r));
            } catch (e) {
              core.warning(`Failed to load GSSOC mentors: ${e?.message || e}`);
              return;
            }

            if (reviewerPool.length === 0) {
              core.info('No reviewers available. Skipping.');
              return;
            }

            reviewerPool = reviewerPool.filter(reviewer =>
              reviewer.toLowerCase() !== pr.user.login.toLowerCase() &&
              !alreadyRequested.includes(reviewer.toLowerCase())
            );

            if (reviewerPool.length === 0) {
              core.info('No eligible reviewers after filtering. Skipping.');
              return;
            }

            const seed = prNumber;
            const poolSize = reviewerPool.length;
            const idx1 = seed % poolSize;
            let idx2 = (seed * 7 + 3) % poolSize;
            if (idx2 === idx1) idx2 = (idx1 + 1) % poolSize;
            let selected = [reviewerPool[idx1]];
            if (poolSize > 1) selected.push(reviewerPool[idx2]);

            const successfulReviewers = [];
            for (const reviewer of selected) {
              try {
                await github.rest.pulls.requestReviewers({
                  owner, repo, pull_number: prNumber, reviewers: [reviewer]
                });
                successfulReviewers.push(reviewer);
              } catch (err) {
                core.warning(`Failed to request review from @${reviewer} (may not be a collaborator): ${err?.message || err}`);
              }
            }

            if (successfulReviewers.length === 0) {
              core.warning('No mentors could be requested as reviewers. They may not be collaborators.');
              return;
            }

            core.info(`Requested reviewers: ${successfulReviewers.join(', ')}`);

            try {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: prNumber, labels: ['mentor-review-requested']
              });
            } catch (e) {
              core.warning(`Failed to add mentor-review-requested label: ${e?.message || e}`);
            }

            try {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `## 👥 Stage 2 — Mentor Review\n\n` +
                  `GSSOC mentors have been requested to review this PR:\n\n` +
                  successfulReviewers.map(s => `- @${s}`).join('\n') + '\n\n' +
                  `At least **1 mentor approval** is required to proceed to Stage 3.\n\n` +
                  `Mentors: please review and approve if the contribution meets quality standards.`
              });
            } catch (e) {
              core.warning(`Failed to post Stage 2 comment: ${e?.message || e}`);
            }
