name: 🤖 DCO Helper

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  pull-requests: write
  contents: read
  issues: write

concurrency:
  group: dco-helper-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dco-helper:
    runs-on: ubuntu-latest
    steps:
      - name: Check Signed-off-by
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;
            const username = pr.user.login;

            // Ignore bot PRs
            if (pr.user.type === 'Bot') return;

            // Get all commits in PR
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100
              }
            );

            let missingDCO = false;
            const signoffRegex = /^Signed-off-by:\s+.+\s+<[^<>\s@]+@[^<>\s@]+>\s*$/mi;
            for (const commit of commits) {
              if (!signoffRegex.test(commit.commit.message || '')) {
                missingDCO = true;
                break;
              }
            }

            // Check for existing DCO comment
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });

            const existing = comments.find(comment =>
              comment.user.type === 'Bot' &&
              (comment.body.includes('DCO Sign-off Missing') || 
               comment.body.includes('DCO Sign-off Verified'))
            );

            let body = '';

            if (missingDCO) {
              body = `## ⚠️ DCO Sign-off Missing\n\n` +
                `Hi @${username} 👋\n\n` +
                `Some commits in this PR are missing the \`Signed-off-by\` line (DCO requirement).\n\n` +
                `### How to Fix:\n\n` +
                '```bash\n' +
                'git commit --amend --signoff\n' +
                'git push --force-with-lease\n' +
                '```\n\n' +
                `For multiple commits:\n\n` +
                '```bash\n' +
                'git rebase --signoff HEAD~N\n' +
                'git push --force-with-lease\n' +
                '```\n\n' +
                `After fixing, this comment will update automatically.`;

              // Update labels
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: 'dco-verified' }); } catch (e) { core.info('Label dco-verified not present'); }
              try { await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['dco-missing'] }); } catch (e) { core.warning(`Failed adding dco-missing label: ${e?.message || e}`); }

            } else {
              body = `## ✅ DCO Sign-off Verified\n\n` +
                `Hi @${username} 👋\n\n` +
                `All commits in this PR have valid \`Signed-off-by\` lines.\n\n` +
                `Thank you for following the DCO requirements! 🚀`;

              // Update labels
              try { await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: 'dco-missing' }); } catch (e) { core.info('Label dco-missing not present'); }
              try { await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['dco-verified'] }); } catch (e) { core.warning(`Failed adding dco-verified label: ${e?.message || e}`); }
            }

            if (existing) {
              const statusChanged = (missingDCO && existing.body.includes('DCO Sign-off Verified')) ||
                                    (!missingDCO && existing.body.includes('DCO Sign-off Missing'));
              if (!statusChanged) {
                core.info('DCO status unchanged — skipping comment update');
                return;
              }
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            }
