name: 🧭 Smart Issue Assignment

on:
  issue_comment:
    types:
      - created

permissions:
  issues: write
  contents: read

concurrency:
  group: smart-issue-assignment-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  handle-assignment:
    name: Handle Assignment Requests

    if: |
      github.event.issue.pull_request == null &&
      github.actor != 'github-actions[bot]'

    runs-on: ubuntu-latest

    steps:
      - name: Process Assignment Commands
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const sender = context.payload.sender;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issue_number = issue.number;
            const username = sender.login;

            // --------------------------------------------------
            // CONFIG
            // --------------------------------------------------

            const MAX_ASSIGNMENTS = 3;

            // Two mentors randomly pinged
            const mentors = [
              "srinadhtadikonda",
              "ritika",
              "CoderOggy78",
              "techRunnerBySJ",
              "thakurutkarsh22",
              "aanjalii01",
              "SyedImtiyaz-1",
              "neilblaze",
              "abhishekraoas",
              "lovestaco",
              "Anushreebasics",
              "12fahed",
              "sabeenaviklar",
              "ayu-yishu13",
              "Precise-Goals",
              "morningstarxcdcode",
              "Haile-12",
              "BandhiyaHardik",
              "deepak0x",
              "knoxiboy",
              "saurabh24thakur",
              "1754riya",
              "magic-peach",
              "lourduradjou",
              "m4milaad",
              "kunalverma2512",
              "anubhavxdev",
              "stealthwhizz",
              "DevROHIT11",
              "leonagoel",
              "SaifRasool92",
              "aryanbhutani26",
              "AnirbansarkarS",
              "Sagar-Datkhile",
              "MUKUL-PRASAD-SIGH",
              "TarunyaProgrammer",
              "preetbiswas12",
              "Shravanthi20",
              "Balaji91221",
              "whyankush07",
              "vanshaggarwal07",
              "OmkarKathile007",
              "kallal79",
              "MAYANKSHARMA01010",
              "swastik7805",
              "KUMARNiru007",
              "rounakkraaj-1744",
              "himanshu007-creator",
              "oasis-parzival",
              "Maxd646",
              "deepaksinghh12",
              "manan-chawla",
              "nishantxscooby",
              "uddalak2005",
              "iarmaanx",
              "kota-jagadeesh",
              "AnirudhPhophalia",
              "IkkiOcean",
              "Eswaramuthu",
              "SparshM8",
              "KaranGupta2005",
              "sparshagarwal0411",
              "subratamondalnsec",
              "the-matrixneo",
              "suvanwita",
              "Harsh-2006-git",
              "nihalawasthi",
              "adithyan-css",
              "xthxr",
              "Devnil434",
              "aayushi1806sharma-afk",
              "AditthyaSS",
              "Satya900",
              "JoeCelaster",
              "AshutoshRaj1260",
              "topshe23",
              "Ayushh-Sharmaa",
              "piyushdotcomm",
              "coder-zs-cse",
              "bishal2623",
              "Ayush-Patel-56",
              "Mohit-368",
              "diksha78dev",
              "Mrigakshi-Rathore",
              "itsdakshjain",
              "UltraBot05",
              "nitinog10",
              "nirvik34"
            ];

            function pickRandomMentors(list, count = 2) {
              const shuffled = [...list]
                .sort(() => 0.5 - Math.random());

              return shuffled.slice(0, count);
            }

            // --------------------------------------------------
            // BOT CHECK
            // --------------------------------------------------

            if (
              sender.type === 'Bot' ||
              username.endsWith('[bot]')
            ) {
              core.info('Skipping bot');
              return;
            }

            // --------------------------------------------------
            // COMMAND PARSING
            // --------------------------------------------------

            const body = (comment.body || '')
              .trim()
              .toLowerCase();

            const wantsAssign =
              /^\/assign(\s+(gssoc|nsoc))?$/.test(body);

            const wantsUnassign =
              /^\/unassign$/.test(body);

            const approveMatch =
              comment.body.match(
                /^\/approve-assignment\s+@([a-zA-Z0-9-]+)$/i
              );

            const wantsApprove =
              !!approveMatch;

            if (
              !wantsAssign &&
              !wantsUnassign &&
              !wantsApprove
            ) {
              core.info('No assignment command detected');
              return;
            }

            // --------------------------------------------------
            // FETCH ISSUE
            // --------------------------------------------------

            const { data: currentIssue } =
              await github.rest.issues.get({
                owner,
                repo,
                issue_number
              });

            // --------------------------------------------------
            // LABELS
            // --------------------------------------------------

            const labels = (currentIssue.labels || [])
              .map(l => l.name.toLowerCase());

            const hasNeedsTriage =
              labels.includes('needs-triage');

            const hasNeedsQuality =
              labels.includes('needs-quality');

            const isValidated =
              !hasNeedsTriage &&
              !hasNeedsQuality;

            // --------------------------------------------------
            // MAINTAINER CHECK
            // --------------------------------------------------

            const { data: permission } =
              await github.rest.repos
                .getCollaboratorPermissionLevel({
                  owner,
                  repo,
                  username
                });

            const isMaintainer =
              ['admin', 'maintain', 'write']
                .includes(permission.permission);

            // --------------------------------------------------
            // UNASSIGN
            // --------------------------------------------------

            if (wantsUnassign) {

              const isAssigned =
                (currentIssue.assignees || [])
                  .some(a => a.login === username);

              if (!isAssigned) {
                core.info('User not assigned');
                return;
              }

              await github.rest.issues.removeAssignees({
                owner,
                repo,
                issue_number,
                assignees: [username]
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `✅ Unassigned @${username} from this issue.`
              });

              return;
            }

            // --------------------------------------------------
            // APPROVE ASSIGNMENT
            // --------------------------------------------------

            if (wantsApprove) {

              if (!isMaintainer) {

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body:
                    `❌ Only mentors or maintainers can approve assignments.`
                });

                return;
              }

              const targetUser = approveMatch[1];

              // Already assigned
              if (
                (currentIssue.assignees || []).length > 0
              ) {

                const assigned =
                  currentIssue.assignees
                    .map(a => `@${a.login}`)
                    .join(', ');

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body:
                    `⚠️ This issue is already assigned to ${assigned}.`
                });

                return;
              }

              // Ensure request exists
              const comments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number,
                  per_page: 100
                }
              );

              const requested = comments.some(c =>
                c.user &&
                c.user.login.toLowerCase() ===
                  targetUser.toLowerCase() &&
                /^\/assign(\s+(gssoc|nsoc))?$/i
                  .test((c.body || '').trim())
              );

              if (!requested) {

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body:
                    `❌ @${targetUser} has not requested assignment for this issue.`
                });

                return;
              }

              // Assignment cap
              const assignedIssues =
                await github.paginate(
                  github.rest.issues.listForRepo,
                  {
                    owner,
                    repo,
                    state: 'open',
                    assignee: targetUser,
                    per_page: 100
                  }
                );

              const activeIssues =
                assignedIssues.filter(i => !i.pull_request);

              if (
                activeIssues.length >= MAX_ASSIGNMENTS
              ) {

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body:
                    `❌ @${targetUser} already has ${MAX_ASSIGNMENTS} active assignments.`
                });

                return;
              }

              // Assign
              await github.rest.issues.addAssignees({
                owner,
                repo,
                issue_number,
                assignees: [targetUser]
              });

              // Labels
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: ['assigned']
                });
              } catch (e) {}

              // Cleanup request label
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number,
                  name: 'assignment-requested'
                });
              } catch (e) {}

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `✅ @${targetUser} has been assigned by @${username}.`
              });

              return;
            }

            // --------------------------------------------------
            // ASSIGN REQUEST
            // --------------------------------------------------

            // Account age check
            const { data: profile } =
              await github.rest.users.getByUsername({
                username
              });

            const ageDays =
              (
                new Date() -
                new Date(profile.created_at)
              ) / (1000 * 60 * 60 * 24);

            if (ageDays < 7) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `❌ @${username}, your GitHub account must be at least 7 days old to request assignments.`
              });

              return;
            }

            // Already assigned
            if (
              (currentIssue.assignees || []).length > 0
            ) {

              const assigned =
                currentIssue.assignees
                  .map(a => `@${a.login}`)
                  .join(', ');

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `⚠️ This issue is already assigned to ${assigned}.`
              });

              return;
            }

            // Assignment cap
            const assignedIssues =
              await github.paginate(
                github.rest.issues.listForRepo,
                {
                  owner,
                  repo,
                  state: 'open',
                  assignee: username,
                  per_page: 100
                }
              );

            const activeIssues =
              assignedIssues.filter(i => !i.pull_request);

            if (
              activeIssues.length >= MAX_ASSIGNMENTS
            ) {

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body:
                  `❌ @${username}, you already have ${activeIssues.length} active assignments.\n\nMaximum allowed: ${MAX_ASSIGNMENTS}`
              });

              return;
            }

            // Add request label
            try {

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [
                  'assignment-requested'
                ]
              });

            } catch (e) {
              core.info('Label already exists');
            }

            // Prevent duplicate request comments
            const MARKER =
              '<!-- assignment-request -->';

            const comments =
              await github.paginate(
                github.rest.issues.listComments,
                {
                  owner,
                  repo,
                  issue_number,
                  per_page: 100
                }
              );

            const existing =
              comments.find(c =>
                c.user.type === 'Bot' &&
                c.body.includes(MARKER) &&
                c.body.includes(`@${username}`)
              );

            if (existing) {
              core.info('Request already acknowledged');
              return;
            }

            // Pick two mentors
            const selectedMentors =
              pickRandomMentors(mentors, 2);

            const mentorMentions =
              selectedMentors
                .map(m => `@${m}`)
                .join(' ');

            // Queue request
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body:
                `${MARKER}\n` +
                `## 📌 Assignment Request Recorded\n\n` +
                `Hi @${username}, your assignment request has been queued for review.\n\n` +

                (
                  isValidated
                    ? `This issue is already validated and awaiting mentor approval.\n\n`
                    : `⚠️ This issue still requires validation/triage before assignment.\n\n`
                ) +

                `### 👀 Mentor Review Requested\n\n` +
                `${mentorMentions}\n\n` +
                `Please:\n` +
                `- validate the issue\n` +
                `- review contributor suitability\n` +
                `- assign using:\n\n` +
                `\`/approve-assignment @${username}\`\n\n` +

                `Assignment factors:\n` +
                `- issue suitability\n` +
                `- contributor workload\n` +
                `- prior participation\n\n` +

                `If mentors are unavailable, a project admin may assign manually.\n\n` +
                `Thank you for your patience 🚀`
            });

            core.info(
              `Assignment request recorded for ${username}`
            );