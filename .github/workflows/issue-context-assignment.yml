name: 🧭 Smart Issue Assignment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: smart-issue-assignment-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  handle-assignment:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Smart Assignment Validation
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const comment = context.payload.comment;
            const sender = context.payload.sender;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            let username = sender.login;

            if (sender.type === 'Bot') return;

            const validGitHubUsername = /^[a-zA-Z0-9](?:[a-zA-Z0-9\-]*[a-zA-Z0-9])?$/;
            if (!validGitHubUsername.test(username)) return;

            const commentBody = (comment.body || '').toLowerCase();

            let wantsAssign = commentBody.includes('/assign') || commentBody.includes('assign me');
            let wantsUnassign = commentBody.includes('/unassign') || commentBody.includes('unassign me');
            const isApproveAssignment = commentBody.includes('/approve-assignment');

            if (!wantsAssign && !wantsUnassign && !isApproveAssignment) return;

            const { data: userPermission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner, repo, username
            });
            const isMaintainer = ['admin', 'maintain', 'write'].includes(userPermission.permission);

            const { data: currentIssue } = await github.rest.issues.get({
              owner, repo, issue_number
            });

            let mentionsGSSOC = commentBody.includes('gssoc');
            let mentionsNSOC = commentBody.includes('nsoc');
            let isMaintainerApprovedAssignment = false;
            let isAutoApproved = false;
            let maintainerApprover = null;

            if (isApproveAssignment) {
              if (!isMaintainer) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `❌ @${username}, only maintainers can approve assignments.`
                });
                return;
              }

              const mentionMatch = comment.body.match(/@([a-zA-Z0-9](?:[a-zA-Z0-9\-]*[a-zA-Z0-9])?)/);
              let targetUser = mentionMatch ? mentionMatch[1] : null;

              const { data: allComments } = await github.rest.issues.listComments({
                owner, repo, issue_number, per_page: 100
              });

              const assignmentRequests = allComments
                .filter(c => {
                  const body = (c.body || '').toLowerCase();
                  return (body.includes('/assign') || body.includes('assign me')) &&
                         c.user &&
                         c.user.type !== 'Bot' &&
                         validGitHubUsername.test(c.user.login);
                })
                .map(c => ({
                  username: c.user.login,
                  timestamp: new Date(c.created_at),
                  commentId: c.id,
                  program: (c.body || '').toLowerCase().includes('gssoc') ? 'gssoc' :
                           (c.body || '').toLowerCase().includes('nsoc') ? 'nsoc' : null
                }))
                .sort((a, b) => a.timestamp - b.timestamp);

              if (assignmentRequests.length === 0) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `⚠️ No assignment requests found in the comments.`
                });
                return;
              }

              if (!targetUser) {
                for (const request of assignmentRequests) {
                  const candidateUsername = request.username;

                  const assignedIssues = await github.paginate(github.rest.issues.listForRepo, {
                    owner, repo, state: 'open', assignee: candidateUsername, per_page: 100
                  });
                  const activeIssues = assignedIssues.filter(i => !i.pull_request);

                  const maxAssignments = 3;

                  if (activeIssues.length < maxAssignments) {
                    targetUser = candidateUsername;
                    await github.rest.issues.createComment({
                      owner, repo, issue_number,
                      body: `✅ **Smart Selection:** @${targetUser} selected (requested at ${request.timestamp.toISOString()}, current workload: ${activeIssues.length}/${maxAssignments})`
                    });
                    break;
                  }
                }

                if (!targetUser) {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number,
                    body: `❌ All users who requested assignment have reached their maximum workload.\n\n` +
                          `**Requests received from:**\n` +
                          assignmentRequests.map(r => `- @${r.username} (${r.timestamp.toISOString()})`).join('\n')
                  });
                  return;
                }
              }

              const targetRequest = assignmentRequests.find(r => r.username.toLowerCase() === targetUser.toLowerCase());
              if (!targetRequest) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `❌ @${targetUser} has not requested assignment for this issue.\n\n` +
                        `**Valid requests from:**\n` +
                        assignmentRequests.map(r => `- @${r.username} (${r.timestamp.toISOString()})`).join('\n')
                });
                return;
              }

              username = targetUser;
              wantsAssign = true;
              wantsUnassign = false;
              mentionsGSSOC = targetRequest.program === 'gssoc';
              mentionsNSOC = targetRequest.program === 'nsoc';
              isMaintainerApprovedAssignment = true;
              maintainerApprover = sender.login;

              core.info(`Maintainer ${sender.login} approved assignment for ${targetUser}`);
            }

            if (wantsUnassign) {
              const isAssigned = (currentIssue.assignees || []).some(a => a.login === username);
              if (!isAssigned) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `⚠️ @${username} is not currently assigned to this issue.`
                });
                return;
              }
              await github.rest.issues.removeAssignees({
                owner, repo, issue_number, assignees: [username]
              });
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `✅ Unassigned @${username} from this issue.`
              });
              return;
            }

            const issueLabels = (currentIssue.labels || []).map(l => l.name.toLowerCase());
            const isVerified = issueLabels.includes('verified') ||
                              issueLabels.includes('ready-for-assignment') ||
                              issueLabels.includes('approved');

            if (!isMaintainerApprovedAssignment && !isVerified && !isMaintainer) {
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `⏳ **Assignment Request Queued**\n\n` +
                      `Hi @${username}! Your assignment request has been recorded.\n\n` +
                      `⚠️ **This issue needs maintainer verification first.**\n\n` +
                      `A maintainer will review this issue and approve assignments using:\n` +
                      `- \`/approve-assignment\` (auto-selects based on timestamp + workload)\n` +
                      `- \`/approve-assignment @username\` (manual selection)\n\n` +
                      `You'll be notified once a decision is made. Thank you for your patience! 🙏`
              });
              return;
            }

            if (!isMaintainerApprovedAssignment && isVerified && !isMaintainer) {
              const BEGINNER_LABELS = ['level:beginner', 'level1'];
              const INTERMEDIATE_LABELS = ['level:intermediate', 'level2'];
              const ADVANCED_LABELS = ['level:advanced', 'level:critical', 'level3'];

              const isBeginnerIssue = issueLabels.some(l => BEGINNER_LABELS.includes(l));
              const isAdvancedIssue = issueLabels.some(l => ADVANCED_LABELS.includes(l));
              const isIntermediateIssue = issueLabels.some(l => INTERMEDIATE_LABELS.includes(l));

              const hasLevelLabel = isBeginnerIssue || isIntermediateIssue || isAdvancedIssue;

              if (!hasLevelLabel) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `⏳ **Assignment Request Queued**\n\n` +
                        `@${username}, this issue hasn't been labeled with a difficulty level yet.\n\n` +
                        `A maintainer will triage and approve assignments. Thank you for your patience!`
                });
                return;
              }

              if (isAdvancedIssue) {
                const { data: mergedSearch } = await github.rest.search.issuesAndPullRequests({
                  q: `repo:${owner}/${repo} is:pr is:merged author:${username}`,
                  per_page: 1
                });
                if ((mergedSearch.total_count || 0) < 1) {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number,
                    body: `⛔ **Assignment Denied**\n\n` +
                          `@${username}, this is an **advanced/Level 3** issue that requires prior experience.\n\n` +
                          `You need at least **1 merged PR** in this repository before working on advanced issues.\n\n` +
                          `Please start with a \`level:beginner\` or \`level:intermediate\` issue first.`
                  });
                  return;
                }
                isAutoApproved = true;
              } else if (isIntermediateIssue) {
                const { data: profile } = await github.rest.users.getByUsername({ username });
                const acctAgeDays = (new Date() - new Date(profile.created_at)) / (1000 * 60 * 60 * 24);
                if (acctAgeDays >= 30) {
                  isAutoApproved = true;
                } else {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number,
                    body: `⏳ **Assignment Request Queued**\n\n` +
                          `@${username}, intermediate/Level 2 issues require an account at least **30 days old** for auto-assignment.\n\n` +
                          `A maintainer will review and approve using \`/approve-assignment\`.\n\n` +
                          `Tip: You can get auto-assigned immediately on \`level:beginner\` issues!`
                  });
                  return;
                }
              } else {
                isAutoApproved = true;
              }
            }

            if (mentionsGSSOC) {
              const now = new Date();
              const unlockDate = new Date(Date.UTC(2026, 4, 14, 18, 30, 0)); // 15 May 2026, 12:00 AM IST
              if (now < unlockDate) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number,
                  body: `⏳ **GSSOC assignments are not yet open.**\n\n` +
                        `GSSOC 2026 contributions open on **15 May 2026, 12:00 AM IST**.\n\n` +
                        `You can still request assignment under **NSOC** if participating.`
                });
                return;
              }
            }

            if (wantsAssign && mentionsGSSOC && mentionsNSOC) {
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `❌ Please mention exactly one program: either \`gssoc\` or \`nsoc\`.`
              });
              return;
            }

            if (wantsAssign && !mentionsGSSOC && !mentionsNSOC) {
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `❌ Please specify the program:\n\n` +
                      `- \`/assign gssoc\`\n` +
                      `- \`/assign nsoc\``
              });
              return;
            }

            const { data: userProfile } = await github.rest.users.getByUsername({ username });
            const accountAge = (new Date() - new Date(userProfile.created_at)) / (1000 * 60 * 60 * 24);
            if (accountAge < 7) {
              await github.rest.issues.createComment({ owner, repo, issue_number,
                body: `❌ @${username}, your GitHub account must be at least **7 days old** to request assignments. This helps prevent spam.` });
              return;
            }

            if ((issue.title || '').trim().length < 10) {
              await github.rest.issues.createComment({ owner, repo, issue_number,
                body: `❌ Issue title is too short. Please improve it before requesting assignment.` });
              return;
            }

            const { data: issueEvents } = await github.rest.issues.listEventsForTimeline({
              owner, repo, issue_number, per_page: 100
            });
            const recentUnassign = issueEvents
              .filter(e => e.event === 'unassigned' && e.assignee && e.assignee.login === username)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

            if (recentUnassign) {
              const hoursSinceUnassign = (new Date() - new Date(recentUnassign.created_at)) / (1000 * 60 * 60);
              if (hoursSinceUnassign < 24) {
                await github.rest.issues.createComment({ owner, repo, issue_number,
                  body: `⏳ @${username}, you were recently unassigned from this issue. Please wait **24 hours** before re-requesting assignment.` });
                return;
              }
            }

            if ((currentIssue.assignees || []).length > 0) {
              const current = (currentIssue.assignees || []).map(a => a.login).join(', ');
              await github.rest.issues.createComment({ owner, repo, issue_number,
                body: `⚠️ This issue is already assigned to: ${current}` });
              return;
            }

            const maxAssignments = 3;
            const assignedIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', assignee: username, per_page: 100
            });
            const activeIssues = assignedIssues.filter(i => !i.pull_request);

            if (activeIssues.length >= maxAssignments) {
              await github.rest.issues.createComment({ owner, repo, issue_number,
                body: `❌ @${username} already has ${activeIssues.length} active assignment(s).\n\nMaximum allowed: **${maxAssignments}**\n\nPlease complete or unassign existing issues first.` });
              return;
            }

            const sanitizedUsername = encodeURIComponent(username);
            const { data: spamResult } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:pr author:${sanitizedUsername} label:"gssoc:spam"`
            });
            const { data: slopResult } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:pr author:${sanitizedUsername} label:"gssoc:ai-slop"`
            });
            const spamSet = new Set([
              ...(spamResult.items || []).map(i => i.number),
              ...(slopResult.items || []).map(i => i.number)
            ]);
            const spamPRs = { length: spamSet.size };

            if (spamPRs.length >= 2) {
              await github.rest.issues.createComment({ owner, repo, issue_number,
                body: `🚫 @${username}, your assignment request has been **denied**.\n\nYou have ${spamPRs.length} PRs previously flagged as spam/AI-slop. Please contact a maintainer to appeal.` });
              return;
            }

            await github.rest.issues.addAssignees({
              owner, repo, issue_number, assignees: [username]
            });

            const programLabel = mentionsGSSOC ? 'gssoc26' : mentionsNSOC ? 'nsoc26' : null;
            if (programLabel) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number, labels: [programLabel]
              });
            }

            const existingLabels = (currentIssue.labels || []).map(l => l.name.toLowerCase());
            const gssocDifficultyLabels = ['level:beginner', 'level:intermediate', 'level:advanced', 'level:critical'];
            const nsocDifficultyLabels = ['level1', 'level2', 'level3'];

            const hasGssocDifficulty = gssocDifficultyLabels.some(l => existingLabels.includes(l));
            const hasNsocDifficulty = nsocDifficultyLabels.some(l => existingLabels.includes(l));

            const issueText = `${(currentIssue.title || '')} ${(currentIssue.body || '')}`.toLowerCase();

            const criticalKeywords = [
              'security vulnerability', 'critical bug', 'data loss', 'breaking change',
              'production down', 'zero-day', 'exploit', 'authentication bypass'
            ];
            const advancedKeywords = [
              'architecture', 'optimization', 'security', 'performance',
              'edge function', 'refactor', 'api', 'caching', 'core feature',
              'database', 'migration', 'scalability', 'infrastructure'
            ];
            const intermediateKeywords = [
              'feature', 'logic', 'analytics', 'sorting', 'filter',
              'enhancement', 'improvement', 'integration', 'validation',
              'component', 'state management', 'responsive'
            ];

            const hasCritical = criticalKeywords.some(k => issueText.includes(k));
            const hasAdvanced = advancedKeywords.some(k => issueText.includes(k));
            const hasIntermediate = intermediateKeywords.some(k => issueText.includes(k));

            const issueAuthor = (currentIssue.user && currentIssue.user.login) || '';
            const isSelfAssigning = issueAuthor.toLowerCase() === username.toLowerCase();
            const maxAutoLevel = isSelfAssigning ? 'intermediate' : 'critical';

            let difficultyNote = '';

            if (mentionsGSSOC && !hasGssocDifficulty) {
              let gssocLevel = 'level:beginner';
              if (maxAutoLevel === 'critical') {
                if (hasCritical) gssocLevel = 'level:critical';
                else if (hasAdvanced) gssocLevel = 'level:advanced';
                else if (hasIntermediate) gssocLevel = 'level:intermediate';
              } else {
                if (hasCritical || hasAdvanced) gssocLevel = 'level:intermediate';
                else if (hasIntermediate) gssocLevel = 'level:intermediate';
              }

              await github.rest.issues.addLabels({
                owner, repo, issue_number, labels: [gssocLevel]
              });
              difficultyNote = `\n\n🏷️ Auto-detected difficulty: \`${gssocLevel}\`. A maintainer may update this.`;
            } else if (mentionsNSOC && !hasNsocDifficulty) {
              let nsocLevel = 'level1';
              if (maxAutoLevel === 'critical') {
                if (hasAdvanced || hasCritical) nsocLevel = 'level3';
                else if (hasIntermediate) nsocLevel = 'level2';
              } else {
                if (hasAdvanced || hasCritical || hasIntermediate) nsocLevel = 'level2';
              }

              await github.rest.issues.addLabels({
                owner, repo, issue_number, labels: [nsocLevel]
              });
              difficultyNote = `\n\n🏷️ Auto-detected difficulty: \`${nsocLevel}\`. A maintainer may update this.`;
            }

            const approvalNote = maintainerApprover
              ? `\n\n✅ **Approved by maintainer:** @${maintainerApprover}`
              : isAutoApproved
                ? `\n\n✅ **Auto-approved** (verified issue, trusted account)`
                : '';

            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: `✅ **Assigned @${username}**\n\n` +
                    `🏷️ Program: \`${programLabel || 'Not Specified'}\`\n\n` +
                    `📌 You now have **${activeIssues.length + 1}** active assignment(s).\n` +
                    `Please work on meaningful contributions and avoid opening many tiny PRs.` +
                    difficultyNote +
                    approvalNote
            });
