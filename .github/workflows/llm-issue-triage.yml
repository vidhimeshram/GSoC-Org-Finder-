name: "\U0001F916 LLM Issue Triage & Validation"

on:
  issues:
    types: [opened, reopened]
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: llm-issue-triage-${{ github.event.issue.number || 'scheduled' }}
  cancel-in-progress: true

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: AI-powered issue classification and duplicate detection
        uses: actions/github-script@v8
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const MAX_ISSUES_PER_RUN = 20;

            async function callLLM(prompt) {
              const apiKey = process.env.GEMINI_API_KEY;
              if (!apiKey) {
                core.warning('GEMINI_API_KEY not set. Skipping LLM triage.');
                return null;
              }

              const models = [
                'gemini-2.0-flash-lite',
                'gemini-2.0-flash'
              ];

              for (const model of models) {
                try {
                  const controller = new AbortController();
                  const timeout = setTimeout(() => controller.abort(), 15000);
                  const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
                    {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      signal: controller.signal,
                      body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.1, maxOutputTokens: 256 }
                      })
                    }
                  );
                  clearTimeout(timeout);

                  if (res.status === 429) {
                    core.info(`Rate limited on ${model}, trying fallback...`);
                    continue;
                  }

                  if (!res.ok) {
                    core.warning(`${model} returned ${res.status}, trying fallback...`);
                    continue;
                  }

                  const data = await res.json();
                  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
                  return text;
                } catch (e) {
                  core.warning(`${model} failed: ${e.message}, trying fallback...`);
                  continue;
                }
              }

              core.warning('All LLM models failed or rate limited.');
              return null;
            }

            function sanitizeInput(text, maxLen) {
              if (!text) return '';
              return text
                .replace(/```[\s\S]*?```/g, '[code block]')
                .replace(/\{[\s\S]*?\}/g, '[object]')
                .replace(/ignore previous|disregard|system prompt|you are now|forget (all|your|the) instructions|do not follow|override|new instructions|act as|pretend you|roleplay|jailbreak/gi, '[filtered]')
                .replace(/\b(SYSTEM|ASSISTANT|USER)\s*:/gi, '[filtered]:')
                .replace(/https?:\/\/[^\s)]+/gi, '[url]')
                .slice(0, maxLen);
            }

            function parseJSON(text) {
              if (!text) return null;
              const cleaned = text.replace(/```json|```/g, '').trim();
              const match = cleaned.match(/\{[^{}]*\}/);
              if (!match) return null;
              try {
                return JSON.parse(match[0]);
              } catch {
                return null;
              }
            }

            const VALID_DIFFICULTIES = ['level:beginner', 'level:intermediate', 'level:advanced'];
            const VALID_TYPES = ['type:bug', 'type:enhancement', 'type:ui', 'type:docs', 'type:api'];
            const VALID_PROGRAMS = ['gssoc', 'nsoc', 'general'];
            const VALID_QUALITIES = ['good', 'needs-info', 'spam'];

            function validateResult(result) {
              if (!result) return null;
              const validated = {};
              validated.difficulty = VALID_DIFFICULTIES.includes(result.difficulty) ? result.difficulty : 'level:beginner';
              validated.type = VALID_TYPES.includes(result.type) ? result.type : 'type:enhancement';
              validated.program = VALID_PROGRAMS.includes(result.program) ? result.program : 'general';
              validated.quality = VALID_QUALITIES.includes(result.quality) ? result.quality : 'good';
              validated.valid = result.valid !== false;
              validated.duplicate_of = typeof result.duplicate_of === 'number' ? result.duplicate_of : null;
              return validated;
            }

            async function triageIssue(issue, cachedOpenIssues) {
              const issueNumber = issue.number;

              const existingLabels = (issue.labels || []).map(l => l.name);
              const alreadyTriaged = existingLabels.some(l =>
                l.startsWith('level:') || l.startsWith('type:') || l === 'spam' || l === 'duplicate'
              );
              if (alreadyTriaged) return;

              const openIssues = cachedOpenIssues || await github.paginate(github.rest.issues.listForRepo, {
                owner, repo, state: 'open', per_page: 100
              });

              const otherIssues = openIssues
                .filter(i => !i.pull_request && i.number !== issueNumber)
                .slice(0, 30)
                .map(i => `#${i.number}: ${sanitizeInput(i.title, 80)}`)
                .join('\n');

              const issueTitle = sanitizeInput(issue.title, 200);
              const issueBody = sanitizeInput(issue.body, 1500);

              const prompt = [
                'SYSTEM: You are a strict JSON classifier for a GitHub repository called FindMyGSoC (a GSoC organization finder tool).',
                'OUTPUT ONLY valid JSON. No explanation, no markdown fences.',
                '',
                'TASK: Classify this issue.',
                '',
                `TITLE: ${issueTitle}`,
                `BODY: ${issueBody}`,
                '',
                'EXISTING ISSUES (check for duplicates):',
                otherIssues,
                '',
                'RULES:',
                '- program: "gssoc" if mentions GSSoC/gssoc, "nsoc" if mentions NSoC/nsoc, "general" otherwise',
                '- difficulty: "level:beginner" for docs/typo/UI, "level:intermediate" for logic/features, "level:advanced" for architecture/security',
                '- type: "type:bug"|"type:enhancement"|"type:ui"|"type:docs"|"type:api"',
                '- quality: "good"|"needs-info"|"spam"',
                '- valid: true if legitimate, false if spam/gibberish',
                '- duplicate_of: issue number (integer) if clearly duplicate, else null',
                '',
                'OUTPUT: {"program":"...","difficulty":"...","type":"...","quality":"...","valid":true,"duplicate_of":null}'
              ].join('\n');

              const rawText = await callLLM(prompt);
              const parsed = parseJSON(rawText);
              const result = validateResult(parsed);

              if (!result) {
                core.warning(`Failed to classify issue #${issueNumber}`);
                return;
              }

              if (!result.valid || result.quality === 'spam') {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber, labels: ['spam', 'invalid']
                });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `🤖 **Auto-Triage:** This issue has been flagged as low-quality or spam.\n\n` +
                        `If this is a mistake, please edit your issue with a clear description and a maintainer will review it.`
                });
                return;
              }

              if (result.duplicate_of && result.duplicate_of !== issueNumber) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber, labels: ['possible-duplicate']
                });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: `🤖 **Possible Duplicate Detected**\n\n` +
                        `This issue appears similar to #${result.duplicate_of}.\n\n` +
                        `Please check if your issue is already covered there. If not, explain how this differs and a maintainer will remove the duplicate label.`
                });
              }

              const labels = [];
              if (result.difficulty) labels.push(result.difficulty);
              if (result.type) labels.push(result.type);
              if (result.program !== 'general') labels.push(`program:${result.program}`);
              if (result.quality === 'needs-info') labels.push('status:needs-info');

              if (labels.length > 0) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber, labels
                });
              }

              const triageNote = [
                `🤖 **Auto-Triaged**`,
                ``,
                `| Field | Value |`,
                `|-------|-------|`,
                `| Difficulty | \`${result.difficulty}\` |`,
                `| Type | \`${result.type}\` |`,
                `| Program | \`${result.program}\` |`,
                result.quality === 'needs-info' ? `| Status | ⚠️ Needs more information |` : null,
                ``,
                `---`,
                ``,
                `**To claim this issue**, comment:`,
                `- \`/assign gssoc\` (for GSSoC contributors)`,
                `- \`/assign nsoc\` (for NSoC contributors)`,
                ``,
                `A maintainer may adjust the labels. Classification is automated and approximate.`
              ].filter(Boolean).join('\n');

              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: triageNote
              });

              core.info(`Triaged issue #${issueNumber}: ${result.difficulty}, ${result.type}, program=${result.program}`);
            }

            if (context.eventName === 'issues') {
              const issue = context.payload.issue;
              if (issue.user.type === 'Bot') return;
              await triageIssue(issue, null);
            } else {
              const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner, repo, state: 'open', per_page: 100
              });

              const untriaged = openIssues.filter(issue => {
                if (issue.pull_request) return false;
                const labels = (issue.labels || []).map(l => l.name);
                return !labels.some(l =>
                  l.startsWith('level:') || l.startsWith('type:') || l === 'spam' || l === 'duplicate'
                );
              });

              core.info(`Found ${untriaged.length} untriaged issues. Processing up to ${MAX_ISSUES_PER_RUN}.`);

              for (const issue of untriaged.slice(0, MAX_ISSUES_PER_RUN)) {
                await triageIssue(issue, openIssues);
                await new Promise(r => setTimeout(r, 2000));
              }
            }
