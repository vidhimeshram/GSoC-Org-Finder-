name: 💤 Auto Unassign Inactive Issues

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  auto-unassign:
    runs-on: ubuntu-latest
    steps:
      - name: Auto unassign inactive contributors
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const INACTIVE_DAYS = 7;
            const now = new Date();
            const cutoff = new Date(now.getTime() - INACTIVE_DAYS * 24 * 60 * 60 * 1000);

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              { owner, repo, state: 'open', per_page: 100 }
            );

            for (const issue of issues) {
              if (issue.pull_request) continue;

              const assignees = (issue.assignees || []).map(a => a.login);
              if (assignees.length === 0) continue;

              const events = await github.paginate(
                github.rest.issues.listEvents,
                { owner, repo, issue_number: issue.number, per_page: 100 }
              );

              for (const assignee of assignees) {
                const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
                  owner, repo, username: assignee
                }).catch(() => ({ data: { permission: 'none' } }));

                if (['admin', 'maintain', 'write'].includes(perm.permission)) continue;

                const assignedEvent = events
                  .filter(e => e.event === 'assigned' && e.assignee && e.assignee.login === assignee)
                  .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

                if (!assignedEvent) continue;

                const assignedAt = new Date(assignedEvent.created_at);
                if (assignedAt > cutoff) continue;

                const comments = await github.paginate(
                  github.rest.issues.listComments,
                  { owner, repo, issue_number: issue.number, per_page: 100 }
                );

                const contributorComments = comments.filter(c =>
                  c.user && c.user.login === assignee && new Date(c.created_at) > assignedAt
                );

                const searchQuery = `repo:${owner}/${repo} is:pr author:${assignee} ${issue.number} in:body`;
                const { data: searchResult } = await github.rest.search.issuesAndPullRequests({
                  q: searchQuery, per_page: 20
                });

                const linkedPR = (searchResult.items || []).find(pr => {
                  if (pr.draft) return false;
                  const body = (pr.body || '').toLowerCase();
                  return (
                    body.includes(`#${issue.number}`) ||
                    body.includes(`closes #${issue.number}`) ||
                    body.includes(`fixes #${issue.number}`) ||
                    body.includes(`resolves #${issue.number}`)
                  );
                });

                if (contributorComments.length > 0 || linkedPR) continue;

                await github.rest.issues.removeAssignees({
                  owner, repo, issue_number: issue.number, assignees: [assignee]
                });

                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `⚠️ Auto-unassigned @${assignee} due to inactivity.\n\n` +
                    `Per the contribution guidelines, assigned contributors are expected to show progress (comment or open a non-draft PR) within **${INACTIVE_DAYS} days**.\n\n` +
                    `You may re-request assignment by commenting \`/assign gssoc\` or \`/assign nsoc\` after 24 hours.`
                });
              }
            }
