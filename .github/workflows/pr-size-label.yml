name: 📏 PR Size Label

on:
  pull_request_target:
    types:
      - opened
      - synchronize

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: pr-size-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label-size:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR by size
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;

            const additions = pr.additions || 0;
            const deletions = pr.deletions || 0;
            const totalChanges = additions + deletions;

            const sizeLabels = ['size/xs', 'size/s', 'size/m', 'size/l', 'size/xl'];

            let sizeLabel;
            if (totalChanges <= 10) sizeLabel = 'size/xs';
            else if (totalChanges <= 50) sizeLabel = 'size/s';
            else if (totalChanges <= 200) sizeLabel = 'size/m';
            else if (totalChanges <= 500) sizeLabel = 'size/l';
            else sizeLabel = 'size/xl';

            for (const label of sizeLabels) {
              if (label !== sizeLabel) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: label });
                } catch (e) {}
              }
            }

            try {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: [sizeLabel] });
            } catch (e) {
              core.warning(`Failed to add size label: ${e?.message || e}`);
            }

            if (sizeLabel === 'size/xl') {
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number: prNumber, per_page: 50
              });

              const marker = '<!-- pr-size-warning -->';
              const hasWarning = comments.some(c => c.body && c.body.includes(marker));

              if (!hasWarning) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body: marker + '\n## 📏 Large PR Detected\n\n' +
                    `This PR has **${totalChanges} lines changed** (${additions}+ / ${deletions}-).\n\n` +
                    'Large PRs are harder to review and more likely to introduce issues. ' +
                    'Consider splitting into smaller, focused PRs when possible.'
                });
              }
            }

            core.info(`PR #${prNumber}: ${totalChanges} lines changed → ${sizeLabel}`);
