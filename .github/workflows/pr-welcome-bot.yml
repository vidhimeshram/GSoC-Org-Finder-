name: 👋 PR Welcome

on:
  pull_request_target:
    types:
      - opened

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: pr-welcome-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  welcome:
    runs-on: ubuntu-latest

    steps:
      - name: Post welcome comment + apply routing labels
        uses: actions/github-script@v8

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const pr = context.payload.pull_request;

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const number = pr.number;
            const author = pr.user.login;

            // --------------------------------------------------
            // DETECTION
            // --------------------------------------------------

            const branch =
              (pr.head.ref || '').toLowerCase();

            const body =
              (pr.body || '').toLowerCase();

            const existingLabels =
              (pr.labels || [])
                .map(l => l.name.toLowerCase());

            const isGssoc =
              existingLabels.includes('gssoc26') ||
              branch.includes('gssoc') ||
              body.includes('gssoc');

            const isNsoc =
              existingLabels.includes('nsoc26') ||
              branch.includes('nsoc') ||
              body.includes('nsoc');

            // --------------------------------------------------
            // IDEMPOTENCY
            // --------------------------------------------------

            const MARKER =
              '<!-- pr-welcome-v2 -->';

            const { data: comments } =
              await github.rest.issues.listComments({
                owner,
                repo,
                issue_number: number,
                per_page: 100
              });

            const alreadyPosted =
              comments.some(c =>
                (c.body || '').includes(MARKER)
              );

            if (alreadyPosted) {
              core.info(
                'Welcome comment already exists'
              );
              return;
            }

            // --------------------------------------------------
            // PROGRAM NOTE
            // --------------------------------------------------

            let programNote = '';

            if (isGssoc) {

              programNote =
                `> 🟢 **GSSOC PR detected** — your PR will be routed through the GSSOC mentor review pipeline.`;

            } else if (isNsoc) {

              programNote =
                `> 🔵 **NSOC PR detected** — your PR will follow the NSOC review pipeline.`;

            } else {

              programNote =
                `> ⚪ **Standard PR detected** — your PR will follow the standard repository review pipeline.`;
            }

            // --------------------------------------------------
            // COMMENT
            // --------------------------------------------------

            const comment = [
              MARKER,

              `## 👋 Thanks for opening a PR, @${author}!`,
              '',

              `Your PR has entered the **🚦 PR Review Pipeline**.`,
              '',

              programNote,
              '',

              '---',
              '',

              '## 🔄 Review Flow',
              '',

              '| Stage | Reviewer | Purpose |',
              '|-------|----------|---------|',
              '| **Stage 1** | 🤖 Automation | Validation · Duplicate Detection · AI/Slop Checks · Formatting · PR Analysis |',
              `| **Stage 2** | ${isGssoc ? '🧑‍🏫 GSSOC Mentor' : isNsoc ? '👥 NSOC Reviewer' : '👥 Repository Reviewer'} | Code Review · Scope Validation · Quality Check |`,
              '| **Stage 3** | 🔑 Project Admin / Maintainer | Final Approval & Merge Decision |',
              '',

              '> The automated PR analysis system will verify issue linkage, PR relevance, and contribution quality.',
              '',

              'A pipeline status comment may appear automatically as your PR progresses.',
              '',

              '---',
              '',

              '## ✅ Contributor Checklist',
              '',

              '- [ ] Sign commits using `git commit -s`',
              '- [ ] Link a valid issue (`Closes #123`)',
              '- [ ] Keep changes focused and relevant',
              '- [ ] Do not include unrelated modifications',
              '- [ ] Ensure workflows/build/tests are passing',
              '- [ ] Read the appropriate contributor guide:',
              `  - [GSSoC Guide](https://github.com/${owner}/${repo}/blob/main/docs/GSSOC_CONTRIBUTOR_GUIDE.md)`,
              `  - [NSoC Guide](https://github.com/${owner}/${repo}/blob/main/docs/NSOC_GUIDE.md)`,
              `  - [General Guide](https://github.com/${owner}/${repo}/blob/main/docs/GENERAL_CONTRIBUTOR_GUIDE.md)`,
              '',

              '---',
              '',

              '## ⚠️ Important Notes',
              '',

              '- Low-quality, spammy, or AI-generated PRs may be closed',
              '- PRs without linked issues may fail automated checks',
              '- Large unrelated PRs are likely to be rejected',
              '- Review times may vary depending on mentor/reviewer availability',
              '',

              `Happy contributing 🚀`,
              '',
              '*This message is posted automatically and only once.*'

            ].join('\n');

            // --------------------------------------------------
            // CREATE COMMENT
            // --------------------------------------------------

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: comment
            });

            core.info(
              `Welcome comment posted for PR #${number}`
            );

            // --------------------------------------------------
            // ROUTING LABELS
            // --------------------------------------------------

            const labelsToAdd = [];

            if (isGssoc) {
              labelsToAdd.push('gssoc-review');
            }

            if (isNsoc) {
              labelsToAdd.push('nsoc-review');
            }

            if (labelsToAdd.length > 0) {

              try {

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: number,
                  labels: labelsToAdd
                });

                core.info(
                  `Added labels: ${labelsToAdd.join(', ')}`
                );

              } catch (e) {

                core.warning(
                  `Failed adding labels: ${e?.message || e}`
                );
              }
            }