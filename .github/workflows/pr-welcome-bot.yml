name: 👋 PR Welcome

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: pr-welcome-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment + apply routing label
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = pr.number;
            const author = pr.user.login;

            // GSSOC / NSOC Detection
            const branch = (pr.head.ref || '').toLowerCase();
            const body = (pr.body || '').toLowerCase();
            const labels = (pr.labels || []).map(l => l.name.toLowerCase());
            
            const isGssoc = 
              labels.includes('gssoc26') ||
              branch.includes('gssoc') ||
              body.includes('gssoc');

            // Idempotency - Don't post multiple times
            const { data: existing } = await github.rest.issues.listComments({
              owner, repo, issue_number: number, per_page: 100
            });

            const MARKER = '<!-- pr-welcome-v1 -->';
            if (existing.some(c => c.body.includes(MARKER))) {
              core.info('Welcome comment already posted — skipping.');
              return;
            }

            const isNsoc = labels.includes('nsoc26');

            const programNote = isGssoc
              ? `> 🟢 **GSSOC PR detected** — your PR will be routed to an approved GSSOC mentor for Stage 2 review.`
              : isNsoc
                ? `> 🔵 **NSOC PR detected** — your PR will follow the standard review pipeline.`
                : `> ⚪ **Standard PR detected** — your PR will follow the standard review pipeline.`;

            const comment = [
              MARKER,
              `## 👋 Thanks for opening a PR, @${author}!`,
              '',
              `Your PR has entered the **🚦 PR Review Pipeline**.`,
              '',
              programNote,
              '',
              '---',
              '',
              '### What happens next',
              '',
              '| Stage | Reviewer | Checks |',
              '|-------|----------|--------|',
              '| **Stage 1** — Automated Validation | 🤖 Bot | DCO · Format · AI/Slop · Duplicate · LLM Analysis |',
              `| **Stage 2** — Human Review | ${isGssoc ? '🧑‍🏫 GSSOC Mentor' : isNsoc ? '⏭️ Auto (Stage 1 pass)' : '👥 Reviewer'} | Code + Quality Review |`,
              '| **Stage 3** — PA / Maintainer Review | 🔑 Project Admin | Final Merge Decision |',
              '',
              '> The **LLM PR Analysis** bot will verify your PR links to a valid issue and that changes match the issue scope.',
              '',
              'A **pipeline status comment** will appear below and update automatically as your PR progresses.',
              '',
              '---',
              '',
              '### Checklist before review',
              '',
              '- [ ] Sign all commits (`git commit -s`)',
              '- [ ] Link your issue (`Closes #123`)',
              '- [ ] Use a feature branch (not `main`)',
              '- [ ] No unrelated changes',
              '- [ ] Read the contributor guide for your program:',
              `  - [GSSoC Guide](https://github.com/${owner}/${repo}/blob/main/docs/GSSOC_CONTRIBUTOR_GUIDE.md)`,
              `  - [NSoC Guide](https://github.com/${owner}/${repo}/blob/main/docs/NSOC_GUIDE.md)`,
              `  - [General Guide](https://github.com/${owner}/${repo}/blob/main/docs/GENERAL_CONTRIBUTOR_GUIDE.md)`,
              '',
              '*This comment is posted only once.*'
            ].join('\n');

            await github.rest.issues.createComment({
              owner, repo, issue_number: number, body: comment
            });

            core.info(`Welcome comment posted for PR #${number}`);

            // Apply routing label for GSSOC
            if (isGssoc) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: number, labels: ['gssoc-review']
                });
                core.info('Added gssoc-review label');
              } catch (e) {
                core.warning(`Failed adding gssoc-review label: ${e?.message || e}`);
              }
            }
