name: Code Quality

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (JS + CSS + HTML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Lint JavaScript
        run: npm run lint:js
      - name: Lint CSS
        run: npm run lint:css
      - name: Lint HTML
        run: npm run lint:html
