name: 👋 Issue Welcome Bot

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome contributor
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const username = issue.user.login;

            if (issue.user.type === 'Bot') return;

            const body = [
              `## 👋 Thanks for opening an issue, @${username}!`,
              ``,
              `Our maintainers will review this issue shortly 🚀`,
              ``,
              `---`,
              ``,
              `## 📘 Before Contributing`,
              ``,
              `Please read the contribution guide carefully before requesting assignment:`,
              ``,
              `👉 https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md`,
              ``,
              `---`,
              ``,
              `## 🧭 New Assignment System`,
              ``,
              `This repository uses a **maintainer-verified assignment system**:`,
              ``,
              `### For Contributors:`,
              `1. Request assignment: \`/assign gssoc\` or \`/assign nsoc\``,
              `2. Your request will be **queued** (not immediately assigned)`,
              `3. A maintainer will verify the issue and approve assignments`,
              `4. You'll be notified when assigned`,
              ``,
              `### Smart Selection:`,
              `Maintainers can use \`/approve-assignment\` to auto-select based on:`,
              `- ⏱️ Request timestamp (first come, first served)`,
              `- 📊 Current workload (users with fewer active issues prioritized)`,
              `- ✅ Contribution history`,
              ``,
              `---`,
              ``,
              `## 🏷️ NSoC'26 / GSSoC'26 Requirement`,
              ``,
              `Please clearly mention whether you are contributing via:`,
              `- \`NSoC'26\``,
              `- \`GSSoC'26\``,
              `- or as a regular contributor`,
              ``,
              `Example: \`I am contributing under GSSoC'26\``,
              ``,
              `⚠️ Assignment requests without this information may be rejected automatically.`,
              ``,
              `---`,
              ``,
              `## ⏳ GSSoC Assignment Restriction`,
              ``,
              `GSSoC contributors will only be allowed to take issue assignments after:`,
              `### 🗓️ May 15th, 12:00 AM IST`,
              ``,
              `Before that date, assignment requests from GSSoC contributors will be automatically blocked.`,
              ``,
              `---`,
              ``,
              `## ⚠️ Important Repository Rules`,
              ``,
              `- **Do not start working before assignment**`,
              `- Maximum active assignments:`,
              `  - GSSOC: 2 issues`,
              `  - NSOC: 3 issues`,
              `- Contributors are encouraged to combine related fixes into 1–2 quality PRs instead of many small PRs`,
              `- PRs without assignment may be closed`,
              `- Spam or low-quality PRs may be rejected`,
              `- Follow the zero-build, zero-dependency philosophy`,
              ``,
              `Happy contributing 🎉`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });
