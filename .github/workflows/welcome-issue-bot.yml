name: ­¤æŗ Issue Welcome Bot

on:
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome contributor
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const username = issue.user.login;

            if (issue.user.type === 'Bot') return;

            const body = [
              `## ­¤æŗ Thanks for opening an issue, @${username}!`,
              ``,
              `Our **AI triage bot** will automatically classify this issue with difficulty and type labels shortly.`,
              ``,
              `---`,
              ``,
              `## ­¤ōś Contributor Guides`,
              ``,
              `Read the guide for your program before requesting assignment:`,
              ``,
              `| Program | Guide |`,
              `|---------|-------|`,
              `| GSSoC'26 | [GSSoC Contributor Guide](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/GSSOC_CONTRIBUTOR_GUIDE.md) |`,
              `| NSoC'26 | [NSoC Contributor Guide](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/NSOC_GUIDE.md) |`,
              `| General | [General Guide](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/GENERAL_CONTRIBUTOR_GUIDE.md) |`,
              ``,
              `---`,
              ``,
              `## ­¤¦Ł How Assignment Works`,
              ``,
              `1. **Wait for triage** ŌĆö the AI bot will label this issue with difficulty and type`,
              `2. **Request assignment**: \`/assign gssoc\` or \`/assign nsoc\``,
              `3. **Verified issues** (labeled \`verified\`, \`ready-for-assignment\`, or \`approved\`):`,
              `   - **Beginner** issues: anyone can self-assign immediately`,
              `   - **Intermediate** issues: account must be Ōēź30 days old`,
              `   - **Advanced** issues: must have Ōēź1 merged PR in this repo`,
              `4. **Unverified issues** require maintainer approval via \`/approve-assignment\``,
              ``,
              `---`,
              ``,
              `## ŌÜĀ’ĖÅ Important Rules`,
              ``,
              `- **Do not start working before assignment is confirmed**`,
              `- Maximum active assignments: **3** (both GSSOC and NSOC)`,
              `- Inactive assignments (no PR within **7 days**) are auto-unassigned`,
              `- Combine related fixes into quality PRs ŌĆö avoid many tiny PRs`,
              `- Spam or AI-generated low-effort PRs will be rejected`,
              `- Follow the zero-build, zero-dependency philosophy`,
              ``,
              `Happy contributing!`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });
