name: ✅ Stage 2 - Review Approval Handler

on:
  pull_request_review:
    types:
      - submitted
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write
  contents: read

concurrency:
  group: stage2-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  handle-review-approval:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request)

    steps:
      - name: Process Stage 2 Approval
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let reviewer, prNumber;

            if (context.eventName === 'pull_request_review') {
              const pr = context.payload.pull_request;
              reviewer = context.payload.review.user.login;
              prNumber = pr.number;

              if (reviewer.toLowerCase() === pr.user.login.toLowerCase()) {
                core.info('Self-approval ignored.');
                return;
              }
            } else {
              const comment = context.payload.comment;
              const commentBody = (comment.body || '').trim().toLowerCase();

              const isExplicitApproval = /^\/(approve-pr|lgtm)\b/.test(commentBody);
              if (!isExplicitApproval) return;

              reviewer = comment.user.login;
              prNumber = context.payload.issue.number;

              const { data: prData } = await github.rest.pulls.get({
                owner, repo, pull_number: prNumber
              });
              if (reviewer.toLowerCase() === prData.user.login.toLowerCase()) {
                core.info('Self-approval via comment ignored.');
                return;
              }
            }

            const { data: labelData } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber
            });
            const labels = labelData.map(l => l.name.toLowerCase());

            const isGssoc = labels.includes('gssoc26');
            const stage1Passed = labels.includes('stage-1-approved');

            if (!stage1Passed) {
              core.info('Stage 1 not passed. Ignoring review approval for Stage 2.');
              return;
            }

            async function addLabel(label) {
              try {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: prNumber, labels: [label]
                });
              } catch (e) { core.warning(`Failed adding label '${label}': ${e?.message || e}`); }
            }

            if (!isGssoc) {
              core.info('PR is not GSSOC. Stage 2 special review not applicable.');
              return;
            }

            let mentorList = [];
            try {
              const { data: file } = await github.rest.repos.getContent({
                owner, repo, path: '.github/reviewers/gssoc-mentors.json', ref: 'main'
              });
              const content = Buffer.from(file.content, 'base64').toString('utf8');
              mentorList = (JSON.parse(content).reviewers || []).map(r => r.toLowerCase());
            } catch (e) {
              core.warning(`Failed to load mentor list: ${e?.message || e}`);
              return;
            }

            if (!mentorList.includes(reviewer.toLowerCase())) {
              core.info(`@${reviewer} is not a GSSOC mentor. Ignoring.`);
              return;
            }

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: prNumber }
            );

            const mentorApprovals = new Set();
            for (const review of reviews) {
              if (review.state !== 'APPROVED') continue;
              if (mentorList.includes(review.user.login.toLowerCase())) {
                mentorApprovals.add(review.user.login.toLowerCase());
              }
            }

            if (context.eventName === 'issue_comment' && mentorList.includes(reviewer.toLowerCase())) {
              mentorApprovals.add(reviewer.toLowerCase());
            }

            core.info(`GSSOC mentor approvals: ${mentorApprovals.size} (${Array.from(mentorApprovals).join(', ')})`);

            if (mentorApprovals.size >= 1) {
              await addLabel('gssoc-mentor-approved');
              await addLabel('mentor-approved');
              await addLabel('pa-review-required');
              await addLabel(`mentor:${reviewer}`);

              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: 'needs-mentor-review'
                });
              } catch (e) {}
              try {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: 'mentor-review-requested'
                });
              } catch (e) {}

              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber,
                body: `## ✅ Stage 2 Complete — Mentor Approved\n\n` +
                  `@${reviewer} has approved this PR.\n\n` +
                  `**Next:** PA/Maintainer review required. Label \`pa-review-required\` has been applied.\n\n` +
                  `@S3DFX-CYBER — this PR is ready for your final review.`
              });

              core.info('Stage 2 complete: GSSOC mentor approved. PA review requested.');
            }
